services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoscreen
      POSTGRES_USER: autoscreen
      POSTGRES_PASSWORD: autoscreen
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoscreen"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://autoscreen:autoscreen@postgres:5432/autoscreen
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-me-in-production}
      - DEFAULT_OPENAI_API_KEY=${DEFAULT_OPENAI_API_KEY:-}
    volumes:
      - screenshots_data:/app/static/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker.local
    environment:
      - DATABASE_URL=postgresql://autoscreen:autoscreen@postgres:5432/autoscreen
      - REDIS_URL=redis://redis:6379/0
      - DEFAULT_OPENAI_API_KEY=${DEFAULT_OPENAI_API_KEY:-}
      - CHROME_BIN=/usr/bin/chromium
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
    volumes:
      - screenshots_data:/app/static/screenshots
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A app.worker.celery_app worker
        --loglevel=info
        --concurrency=1
        --max-tasks-per-child=5
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

volumes:
  postgres_data:
  screenshots_data:
